name: Check Data Freshness

# 数据停更告警：本机三个计划任务是唯一的数据更新通道（GH Actions 抓取因代理失效停用），
# 机器离线/睡眠/任务挂掉时没有任何兜底，只能靠这里发现。
# 只在数据落后超过阈值时 fail —— fail 即 GitHub 给你发邮件，收到就去看机器。
#
# 2026-07-22 拆仓库后：本仓库 bishuju-web 是公开的前端+数据仓库，三个本机任务把
# data/rankings.json 推到这里（后端源码在私有仓库 bishuju）。这里读的就是任务 push 的
# 结果（actions/checkout 拉下来的已提交文件），不夹 Pages/CDN 两层，直接反映数据是否停更。
# 若日后想连"公开站是否还在服务"也一起监控，把 read-from-checkout 换成 urllib 抓
# https://gouzhuang748.com/data/rankings.json 即可。

on:
  schedule:
    # 每 2 小时查一次（GH cron 可能延迟/跳过，但停更状态会持续存在，下一次总能抓到）
    - cron: '17 */2 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (仅最新一次提交，避免拉整段每小时数据提交的历史)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check updateTime is fresh
        run: |
          python3 - << 'PYEOF'
          import json, sys
          from datetime import datetime, timezone

          with open("data/rankings.json", encoding="utf-8") as f:
              data = json.load(f)

          def age_min(field):
              ts = datetime.strptime(data[field], "%Y-%m-%d %H:%M:%S UTC").replace(tzinfo=timezone.utc)
              return (datetime.now(timezone.utc) - ts).total_seconds() / 60

          a = age_min("updateTime")
          print(f"updateTime: {data['updateTime']}  (落后 {a:.0f} 分钟，crypto 独占字段——A股/美股 不写它)")
          if a > 150:
              print("::error::加密数据已超过 2.5 小时未更新 —— 本机每小时计划任务可能挂了，去看机器！")
              sys.exit(1)

          # A股/美股独立新鲜度检查：两者都是 daily cadence（A股 每天 15:05 北京时间收盘后、
          # 美股 每天 21:20 UTC 触发后还要等发布+增量补缓存），用远大于 crypto 的 30 小时
          # 阈值（容忍节假日/偶发延迟）；字段不存在（该管道还没跑过第一次）时跳过而非报警。
          # updateTime 是"谁最后写谁生效"，crypto 每小时都会刷新它，光看它无法发现
          # A股/美股 任务本身挂了。
          for field, label, task in [
              ("ashareUpdateTime", "A股", "A股每日计划任务"),
              ("usUpdateTime", "美股", "美股每日计划任务"),
          ]:
              if field not in data:
                  continue
              m = age_min(field)
              print(f"{field}: {data[field]}  (落后 {m:.0f} 分钟)")
              if m > 30 * 60:
                  print(f"::error::{label}数据已超过 30 小时未更新 —— {task}可能挂了，去看机器！")
                  sys.exit(1)

          print("OK：数据新鲜。")
          PYEOF

      # 付费数据链路（Worker KV）独立检查：上面的检查只覆盖公开文件——付费用户真正读的
      # 是 Worker KV（X-License-Key → /api/data），upload 断了（400/token 失效等）公开侧
      # 一切正常、这里才能发现（split_output 400 事故曾静默近一天，2026-07-22 加）。
      # KV updateTime 每小时被 crypto 上传刷新，阈值与 crypto 同为 2.5h。
      # /api/status 只回元信息（updateTime/tab 数/字节数），公开无鉴权。
      # ⚠️ 若日后紧急关闭付费墙（PAYWALL_ENABLED=false），上传停止、这步会开始告警——
      # 届时把本步一并注释掉。
      - name: Check paid-data KV freshness (Worker /api/status)
        run: |
          # 自定义 UA：Cloudflare 会把已知机器人 UA 直接 403（error 1010，license.py 同款坑）
          body=$(curl -sS --retry 3 --retry-delay 5 -A "bishuju-freshness-check/1.0" \
            https://bishuju-api.fanshenpan.workers.dev/api/status) || {
            echo "::error::Worker /api/status 连不上 —— 付费数据服务可能整体不可用！"; exit 1; }
          echo "$body"
          python3 - "$body" << 'PYEOF'
          import json, sys
          from datetime import datetime, timezone

          d = json.loads(sys.argv[1])
          if not d.get("ok") or not d.get("updateTime"):
              print(f"::error::Worker /api/status 异常：{d} —— 付费数据缺失或损坏！")
              sys.exit(1)
          ts = datetime.strptime(d["updateTime"], "%Y-%m-%d %H:%M:%S UTC").replace(tzinfo=timezone.utc)
          m = (datetime.now(timezone.utc) - ts).total_seconds() / 60
          print(f"KV updateTime: {d['updateTime']}  (落后 {m:.0f} 分钟, tabs={d.get('tabs')}, bytes={d.get('bytes')})")
          if m > 150:
              print("::error::付费数据(Worker KV)已超过 2.5 小时未更新 —— 上传链路断了，付费用户正在受影响！")
              sys.exit(1)
          print("OK：付费数据新鲜。")
          PYEOF
